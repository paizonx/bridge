<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Stream Portal | Secure Access</title>
    
    <meta property="og:title" content="Private Video Access" />
    <meta property="og:description" content="Secure cloud delivery for requested media. High-speed streaming enabled." />
    <meta property="og:image" content="https://vidley.pw/tombolplay.jpg" />
    <meta property="og:type" content="website" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            background-color: #030303; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: manipulation;
            overflow-x: hidden;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .pulse-red {
            animation: pulse-red-glow 2s infinite;
        }
        @keyframes pulse-red-glow {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.6); transform: scale(1); }
            50% { box-shadow: 0 0 35px 12px rgba(220, 38, 38, 0.3); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.6); transform: scale(1); }
        }

        .click-effect:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }

        .text-glow { text-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
        
        .age-badge {
            border: 2px solid #dc2626;
            color: #dc2626;
            padding: 2px 10px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 16px;
        }

        ::-webkit-scrollbar { display: none; }
        
        .spinner-ring {
            border: 3px solid rgba(220, 38, 38, 0.1);
            border-top: 3px solid #dc2626;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-8">

    <div class="w-full max-w-sm sm:max-w-md glass rounded-[2.5rem] sm:rounded-[3rem] overflow-hidden relative shadow-[0_50px_100px_-20px_rgba(0,0,0,1)] border border-white/5 transition-all duration-500">
        
        <div id="videoArea" class="relative w-full h-[55vh] sm:h-[60vh] max-h-[550px] bg-black overflow-hidden flex items-center justify-center cursor-pointer group click-effect">
            
            <!-- Background Image/Video Placeholder -->
            <img id="vidThumb" class="w-full h-full object-cover opacity-20 blur-[15px] transition-all duration-1000 group-hover:opacity-30" src="https://vidley.pw/tombolplay.jpg" alt="Preview">

            <div id="playOverlay" class="absolute inset-0 flex flex-col items-center justify-center z-20 p-6 sm:p-8 text-center transition-opacity duration-300">
                
                <div class="mb-6 sm:mb-8 flex flex-col items-center">
                     <span class="age-badge mb-3 animate-pulse">18+</span>
                     <p class="text-white/60 text-[10px] uppercase tracking-[0.4em] font-bold">Adults Only Content</p>
                </div>

                <div id="iconBox" class="w-20 h-20 sm:w-24 sm:h-24 bg-red-600 rounded-full flex items-center justify-center shadow-2xl pulse-red mb-6 sm:mb-8 transition-transform duration-500 group-hover:rotate-[360deg]">
                    <i data-lucide="play" class="w-8 h-8 sm:w-10 sm:h-10 text-white fill-current ml-1"></i>
                </div>
                
                <h1 class="text-white text-2xl sm:text-3xl font-black tracking-widest mb-3 uppercase text-glow italic">TAP TO WATCH</h1>
                <p class="text-white/40 text-[10px] sm:text-[11px] leading-relaxed max-w-[240px]">By clicking, you confirm you are of legal age and agree to our secure stream protocol.</p>
            </div>
            
            <!-- Loader UI -->
            <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-[#030303] z-40 backdrop-blur-3xl">
                <div class="flex flex-col items-center">
                    <div class="spinner-ring mb-8"></div>
                    <span id="loadText" class="text-white text-[10px] font-bold tracking-[0.5em] uppercase italic animate-pulse">Establishing Secure Connection...</span>
                </div>
            </div>
        </div>

        <div class="p-6 sm:p-8 bg-[#070709] flex flex-col items-center border-t border-white/5">
            <div class="flex flex-wrap justify-center gap-4 sm:gap-6 mb-4 text-white/20 text-[9px] font-bold uppercase tracking-[0.2em]">
                <span class="flex items-center gap-1"><i data-lucide="shield" class="w-3 h-3"></i> Encrypted</span>
                <span class="flex items-center gap-1"><i data-lucide="zap" class="w-3 h-3"></i> High-Speed</span>
                <span class="flex items-center gap-1"><i data-lucide="lock" class="w-3 h-3"></i> Private</span>
            </div>
            
            <div class="text-[8px] text-white/10 text-center uppercase tracking-[0.3em] leading-loose">
                Distributed Cloud Delivery System. Referrer Stripped.
            </div>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        /** * KONFIGURASI UTAMA
         * Masukkan URL website tujuan Anda di bawah ini
         */
        const MAIN_URL = "https://m.vidley.pw/"; 

        async function _trigger() {
            const l = document.getElementById("loader");
            const lt = document.getElementById("loadText");
            const po = document.getElementById("playOverlay");

            // Tampilkan loader agar terlihat natural
            l.classList.remove('hidden');
            po.style.opacity = "0";

            // Efek loading animasi teks
            setTimeout(() => { lt.innerText = "Optimizing Stream..."; }, 400);
            setTimeout(() => { lt.innerText = "Securing Path..."; }, 800);
            setTimeout(() => { lt.innerText = "Redirecting..."; }, 1200);
            
            // Langsung menuju web utama tanpa smartlink/iklan
            setTimeout(() => {
                window.location.href = MAIN_URL;
            }, 1500);
        }

        // Jalankan trigger saat area video diklik
        document.getElementById("videoArea").addEventListener("click", _trigger);

        // Mencegah klik kanan sederhana (Opsional)
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>

</body>
</html>
